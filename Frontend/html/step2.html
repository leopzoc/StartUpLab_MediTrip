<!DOCTYPE html>

<link rel="stylesheet" href="css/style.css">

<!-- Aggiungi questi due link direttamente qui -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    rel="stylesheet">

<html class="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <title>Meditrip Onboarding - Step 1</title>

    <!-- Importiamo i file CSS locali (Custom Styles) e i Font (già importati e configurati dentro style.css) -->
    <!-- <link rel="stylesheet" href="css/style.css"> -->

    <!-- Inizializziamo il nostro file Javascript che racchiude i Colori e il design estetico appositamente per Tailwind -->
    <!-- <script src="js/tailwind-config.js"></script> -->

    <!-- Carichiamo il network esterno di Tailwind (attraverso CDN). 
         Questo motore leggerà dinamicamente le classi come "bg-surface" e applicherà i CSS matematicamente perfetti -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>


    <script src="../js/posizione.js" defer></script>
</head>


<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col items-center">
    <!-- Top Navigation Header -->
    <header
        class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl flex items-center justify-between px-6 py-4 max-w-md mx-auto">
        <button
            class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-stone-100 transition-colors active:scale-95 duration-200">
            <span class="material-symbols-outlined text-stone-800" data-icon="arrow_back">arrow_back</span>
        </button>
        <span class="text-xl font-extrabold text-stone-800 tracking-tight">Vitality</span>
        <div class="w-10"></div> <!-- Spacer for centering title -->
    </header>
    <!-- Main Content Canvas -->
    <main class="w-full max-w-[420px] px-6 pt-24 pb-32 flex flex-col">
        <!-- Progress Indicator -->
        <div class="mb-10">
            <div class="flex justify-between items-end mb-3">
                <p class="text-[10px] font-bold uppercase tracking-[0.15em] text-primary">Step 2 of 4</p>
                <p class="text-[10px] font-medium text-on-surface-variant uppercase tracking-widest">Location &amp;
                    Study</p>
            </div>
            <div class="h-1.5 w-full bg-surface-container-low rounded-full overflow-hidden">
                <div class="h-full bg-primary-container w-1/2 rounded-full shadow-[0_0_8px_rgba(210,251,59,0.5)]"></div>
            </div>
        </div>
        <!-- Editorial Headline Section -->
        <section class="mb-10">
            <h1 class="text-4xl font-extrabold tracking-tighter text-on-surface leading-[1.1] mb-3">
                Where are you studying, Emma?
            </h1>
            <p class="text-body-md text-on-surface-variant leading-relaxed">
                We'll show you care options near you. This helps us tailor local health providers to your campus.
            </p>
        </section>
        <!-- Form Section -->
        <form class="space-y-6">
            <!-- City Selection -->
            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">City in
                    Italy</label>
                <div class="relative group">
                    <select id="city"
                        class="w-full h-14 pl-4 pr-12 appearance-none bg-surface-container-low border-gray-200 rounded-lg text-on-surface focus:ring-2 focus:ring-primary/20 transition-all font-medium">
                        <option disabled="" selected="" value="">Select your city</option>
                        <option value="bolzano">Bolzano</option>
                        <option value="trento">Trento</option>
                    </select>
                </div>
            </div>
            <!-- University Selection -->
            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label
                        class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">University</label>
                    <span class="text-[10px] font-semibold text-outline-variant uppercase">Optional</span>
                </div>
                <div class="relative group">
                    <select id="university"
                        class="w-full h-14 pl-4 pr-12 appearance-none bg-surface-container-low border-gray-200 rounded-lg text-on-surface focus:ring-2 focus:ring-primary/20 transition-all font-medium">
                        <option disabled="" selected="" value="">Select your university</option>
                        <option value="unibz">Libera Università di Bolzano</option>
                        <option value="unitn">Università degli Studi di Trento</option>
                        <option value="laba">LABA</option>
                        <option value="bonporti">Conservatorio di Musica Francesco Antonio Bonporti</option>
                        <option value="monteverdi">Conservatorio di Musica Claudio Monteverdi</option>
                    </select>
                </div>
            </div>
        </form>
    </main>

    <!-- Bottom Action Bar -->
    <footer
        class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto px-6 py-8 bg-white/70 backdrop-blur-xl rounded-t-2xl flex flex-col gap-4">
        <button id='continue-btn1'
            class="w-full h-16 bg-primary-container text-on-primary-container font-extrabold rounded-xl flex items-center justify-center gap-2 shadow-[0_8px_24px_rgba(210,251,59,0.3)] hover:opacity-90 active:scale-95 transition-all">
            Continue
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
        </button>
        <button
            class="w-full py-2 text-on-surface-variant font-bold text-xs uppercase tracking-widest hover:text-on-surface transition-colors">
            Skip for now
        </button>
    </footer>
    <!-- Bottom Navigation Bar (Shell - suppressed as per Transactional rule, but structure kept for Step logic if needed in other screens) -->
    <!-- The BottomNavBar is suppressed on this onboarding screen to prioritize the focused journey -->
</body>

</html>
