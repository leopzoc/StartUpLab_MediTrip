<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediTrip — Care Flow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .phone-shell {
    width: 390px;
    height: 844px;
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    background: #fff;
    box-shadow: 0 0 0 1px #333, 0 40px 100px rgba(0,0,0,0.6), 0 0 0 10px #1a1a1a, 0 0 0 11px #333;
    flex-shrink: 0;
  }
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    background: #fff;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease;
    overflow: hidden;
  }
  .screen.enter { transform: translateX(100%); opacity: 0; }
  .screen.active { transform: translateX(0); opacity: 1; }
  .screen.exit { transform: translateX(-30%); opacity: 0; pointer-events: none; }
  .screen.back-enter { transform: translateX(-30%); opacity: 0; }
  .screen.back-exit { transform: translateX(100%); opacity: 0; pointer-events: none; }

  /* Dynamic island */
  .island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; border-radius: 20px; background: #000;
    z-index: 100; pointer-events: none;
  }
  /* Status bar */
  .status-bar {
    height: 54px; display: flex; align-items: flex-end; padding: 0 28px 8px;
    justify-content: space-between; flex-shrink: 0; position: relative; z-index: 10;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; color: #111; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  /* Scrollable content area */
  .scroll-content { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .scroll-content::-webkit-scrollbar { display: none; }
  /* Bottom nav */
  .bottom-nav {
    height: 72px; background: #fff; border-top: 1px solid #F0F0F0;
    display: flex; align-items: flex-start; padding-top: 10px;
    flex-shrink: 0; padding-bottom: 0;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer;
  }
  .nav-label { font-size: 10px; font-weight: 500; }
  /* Home indicator */
  .home-indicator {
    height: 28px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; background: #fff;
  }
  .home-bar { width: 134px; height: 5px; border-radius: 3px; background: #1C1C1E; opacity: 0.18; }

  /* Buttons */
  .btn-lime {
    background: #C5F135; color: #1C1C1A;
    border: none; border-radius: 16px;
    font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700;
    padding: 17px 24px; cursor: pointer; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-lime:hover { opacity: 0.9; }
  .btn-lime:active { transform: scale(0.98); }
  .btn-lime.disabled { background: #EBEBEB; color: #999; cursor: default; }
  .btn-outline {
    background: transparent; color: #1C1C1A;
    border: 1.5px solid #E0E0E0; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    padding: 13px 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s;
  }
  .btn-outline:hover { background: #F9F9F9; }
  .btn-teal {
    background: #14B8A6; color: #fff;
    border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    padding: 13px 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: opacity 0.15s;
  }
  .btn-teal:hover { opacity: 0.9; }
  .btn-coral {
    background: #FF4D4D; color: #fff;
    border: none; border-radius: 16px;
    font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700;
    padding: 18px 24px; cursor: pointer; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.15s;
  }
  .btn-coral:hover { opacity: 0.9; }

  /* Tags */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #D1FAE5; color: #065F46; }
  .badge-amber { background: #FEF3C7; color: #92400E; }
  .badge-red { background: #FFE4E4; color: #B91C1C; }
  .badge-gray { background: #F3F4F6; color: #4B5563; }
  .badge-teal { background: #CCFBF1; color: #0F766E; }
  .badge-lime { background: #ECFCCB; color: #3F6212; }

  /* Cards */
  .card {
    background: #F7F7F5; border-radius: 20px; padding: 20px;
    cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
  }
  .card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  .card:active { transform: scale(0.99); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 52px; height: 52px; border-radius: 50%;
    border: 3.5px solid #E0FDF4; border-top-color: #14B8A6;
    animation: spin 0.8s linear infinite;
  }

  /* Slide down from top */
  @keyframes slideDown { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Pill selector */
  .pill-btn {
    border: 1.5px solid #EBEBEB; border-radius: 999px;
    padding: 10px 16px; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer;
    background: #fff; color: #1C1C1A;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .pill-btn.selected { background: #14B8A6; border-color: #14B8A6; color: #fff; }

  /* Symptom chip */
  .symptom-chip {
    border: 1.5px solid #EBEBEB; border-radius: 14px;
    padding: 14px 16px; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer;
    background: #fff; color: #1C1C1A;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.15s;
  }
  .symptom-chip.selected { background: #F0FDFB; border-color: #14B8A6; color: #0F766E; }

  /* Back button */
  .back-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; color: #1C1C1A;
    padding: 0;
  }

  /* Clinic card highlight */
  .clinic-card-featured { border: 1.5px solid #14B8A6; border-radius: 20px; overflow: hidden; }
  .clinic-card { border: 1.5px solid #EBEBEB; border-radius: 20px; overflow: hidden; margin-top: 12px; }
  .featured-banner { background: #14B8A6; padding: 6px 16px; font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 0.4px; }

  /* Map placeholder */
  .map-placeholder {
    background: linear-gradient(135deg, #E0F2FE 0%, #DBEAFE 50%, #E0E7FF 100%);
    border-radius: 16px; height: 140px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .map-placeholder::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.3) 0px, rgba(255,255,255,0.3) 1px, transparent 1px, transparent 32px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.3) 0px, rgba(255,255,255,0.3) 1px, transparent 1px, transparent 32px);
  }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 20px; right: 20px;
    background: #fff; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    padding: 16px; width: 200px; z-index: 9999;
    display: none; font-family: 'DM Sans', sans-serif;
  }
  #tweaks-panel h3 { font-size: 13px; font-weight: 700; color: #1C1C1A; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
  .tweak-row { margin-bottom: 10px; }
  .tweak-label { font-size: 11px; font-weight: 600; color: #666; margin-bottom: 4px; }
  .tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-opt { padding: 5px 10px; border-radius: 8px; border: 1.5px solid #EBEBEB; font-size: 12px; font-weight: 600; cursor: pointer; color: #333; }
  .tweak-opt.active { background: #C5F135; border-color: #C5F135; color: #1C1C1A; }
</style>
</head>
<body>

<div class="phone-shell" id="phone">
  <div class="island"></div>
  <!-- Screens rendered by React -->
  <div id="root" style="width:100%;height:100%;position:relative;overflow:hidden;"></div>
</div>

<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <div class="tweak-row">
    <div class="tweak-label">Starting Screen</div>
    <div class="tweak-options" id="screen-tweaks"></div>
  </div>
  <div class="tweak-row">
    <div class="tweak-label">User Name</div>
    <input id="name-tweak" style="width:100%;padding:6px 10px;border-radius:8px;border:1.5px solid #EBEBEB;font-family:'DM Sans',sans-serif;font-size:13px;" value="Emma"/>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Shared components ──────────────────────────────────────────

const StatusBar = ({ dark }) => (
  <div className="status-bar" style={dark ? { background: 'transparent' } : {}}>
    <span className="time" style={dark ? { color: '#fff' } : {}}>9:41</span>
    <div className="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill={dark ? '#fff' : '#111'}>
        <rect x="0" y="8" width="3" height="4" rx="0.7"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="0.7"/>
        <rect x="9" y="3" width="3" height="9" rx="0.7"/><rect x="13.5" y="0" width="3.2" height="12" rx="0.7"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill={dark ? '#fff' : '#111'}>
        <path d="M8 2.5C10 2.5 11.8 3.3 13.2 4.6L14.2 3.5C12.5 1.9 10.4 1 8 1 5.6 1 3.5 1.9 1.8 3.5L2.8 4.6C4.2 3.3 6 2.5 8 2.5Z"/>
        <path d="M8 6C9.2 6 10.3 6.5 11.1 7.3L12.1 6.3C11 5.2 9.6 4.5 8 4.5 6.4 4.5 5 5.2 3.9 6.3L4.9 7.3C5.7 6.5 6.8 6 8 6Z"/>
        <circle cx="8" cy="10" r="1.5"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill={dark ? '#fff' : '#111'}>
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke={dark ? '#fff' : '#111'} strokeOpacity="0.4" fill="none"/>
        <rect x="2" y="2" width="18" height="8" rx="2" fill={dark ? '#fff' : '#111'}/>
        <path d="M23 4v4c.9-.3 1.5-1.2 1.5-2s-.6-1.7-1.5-2z" fill={dark ? '#fff' : '#111'} opacity="0.4"/>
      </svg>
    </div>
  </div>
);

const HomeIndicator = ({ dark }) => (
  <div className="home-indicator" style={dark ? { background: 'transparent' } : {}}>
    <div className="home-bar" style={dark ? { background: 'rgba(255,255,255,0.5)' } : {}}/>
  </div>
);

const BackBtn = ({ onBack, dark, label = '' }) => (
  <button className="back-btn" onClick={onBack} style={dark ? { color: '#fff' } : {}}>
    <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
      <path d="M8 1L1 8l7 7" stroke={dark ? '#fff' : '#1C1C1A'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
    {label}
  </button>
);

// ── Screen 1: Home ────────────────────────────────────────────
function ScreenHome({ navigate, userName }) {
  const items = [
    { id: 'my-coverage', icon: '🛡️', label: 'My coverage', sub: 'EHIC + University', color: '#F0FDF4', accent: '#059669' },
    { id: 'my-documents', icon: '📄', label: 'My documents', sub: '3 files saved', color: '#F8F7FF', accent: '#7C3AED' },
  ];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#fff' }}>
      <StatusBar/>
      <div className="scroll-content" style={{ padding: '4px 20px 20px' }}>
        {/* Greeting */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: '#888', marginBottom: 4, letterSpacing: 0.3 }}>GOOD MORNING</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: '#1C1C1A', lineHeight: 1.2 }}>Hello, {userName} 👋</div>
          <div style={{ fontSize: 15, color: '#888', marginTop: 4 }}>How can we help you today?</div>
        </div>

        {/* I need help card */}
        <div
          className="card"
          onClick={() => navigate('triage')}
          style={{ background: 'linear-gradient(135deg, #FFF5F5 0%, #FFF0EE 100%)', marginBottom: 14, border: '1.5px solid #FFD6D0', padding: 22 }}
        >
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <div style={{ fontSize: 22, fontWeight: 800, color: '#1C1C1A', marginBottom: 6 }}>I need help</div>
              <div style={{ fontSize: 14, color: '#666', lineHeight: 1.4 }}>Find care fast — symptoms,<br/>coverage & nearest clinic</div>
            </div>
            <div style={{ width: 52, height: 52, borderRadius: 16, background: '#FF4D4D', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, flexShrink: 0 }}>
              🚨
            </div>
          </div>
          <div style={{ marginTop: 18 }}>
            <button className="btn-coral" style={{ borderRadius: 12, padding: '13px 18px', fontSize: 15 }}>
              Get care now →
            </button>
          </div>
        </div>

        {/* Two smaller cards */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {items.map(it => (
            <div key={it.id} className="card" style={{ background: it.color, padding: 18 }}>
              <div style={{ fontSize: 26, marginBottom: 10 }}>{it.icon}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: '#1C1C1A' }}>{it.label}</div>
              <div style={{ fontSize: 12, color: '#888', marginTop: 3 }}>{it.sub}</div>
            </div>
          ))}
        </div>

        {/* Coverage summary */}
        <div style={{ marginTop: 20, background: '#FAFAF8', borderRadius: 18, padding: 18, border: '1.5px solid #EBEBEB' }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#888', letterSpacing: 0.5, marginBottom: 12 }}>ACTIVE COVERAGE</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <span className="badge badge-green">✓ EHIC</span>
            <span className="badge badge-teal">✓ University Insurance</span>
            <span className="badge badge-lime">IT · Bologna</span>
          </div>
          <div style={{ marginTop: 12, fontSize: 13, color: '#888' }}>Valid until <strong style={{ color: '#1C1C1A' }}>Aug 31, 2026</strong></div>
        </div>
      </div>

      {/* Bottom nav */}
      <BottomNav active="home" navigate={navigate}/>
      <HomeIndicator/>
    </div>
  );
}

// ── Screen 2: Triage ──────────────────────────────────────────
function ScreenTriage({ navigate, onBack }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#fff' }}>
      <StatusBar/>
      <div style={{ padding: '0 20px 10px', display: 'flex', alignItems: 'center' }}>
        <BackBtn onBack={onBack}/>
      </div>
      <div className="scroll-content" style={{ padding: '8px 20px 28px' }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: '#888', letterSpacing: 0.8, marginBottom: 12 }}>HOW ARE YOU FEELING?</div>
        <div style={{ fontSize: 30, fontWeight: 800, color: '#1C1C1A', lineHeight: 1.2, marginBottom: 8 }}>
          What's going on?
        </div>
        <div style={{ fontSize: 15, color: '#888', marginBottom: 28, lineHeight: 1.5 }}>
          Be honest — we'll find the right care for you.
        </div>

        {/* Severe card */}
        <div
          onClick={() => navigate('severe')}
          style={{
            background: 'linear-gradient(135deg, #FF4D4D 0%, #E63030 100%)',
            borderRadius: 22, padding: 22, cursor: 'pointer', marginBottom: 14,
            boxShadow: '0 6px 24px rgba(255,77,77,0.28)',
            transition: 'transform 0.12s, box-shadow 0.12s',
          }}
          onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 10px 32px rgba(255,77,77,0.35)'; }}
          onMouseLeave={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='0 6px 24px rgba(255,77,77,0.28)'; }}
        >
          <div style={{ fontSize: 32, marginBottom: 10 }}>🚨</div>
          <div style={{ fontSize: 21, fontWeight: 800, color: '#fff', marginBottom: 6 }}>I feel very unwell</div>
          <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.8)', lineHeight: 1.5 }}>
            Severe pain, difficulty breathing,<br/>chest pain, loss of consciousness
          </div>
          <div style={{ marginTop: 16, display: 'flex', alignItems: 'center', gap: 6, color: '#fff', fontSize: 14, fontWeight: 700 }}>
            Get emergency help <span>→</span>
          </div>
        </div>

        {/* Mild card */}
        <div
          onClick={() => navigate('body')}
          style={{
            background: 'linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%)',
            borderRadius: 22, padding: 22, cursor: 'pointer',
            border: '1.5px solid #FDE68A',
            transition: 'transform 0.12s',
          }}
          onMouseEnter={e => e.currentTarget.style.transform='translateY(-2px)'}
          onMouseLeave={e => e.currentTarget.style.transform=''}
        >
          <div style={{ fontSize: 32, marginBottom: 10 }}>🟡</div>
          <div style={{ fontSize: 21, fontWeight: 800, color: '#1C1C1A', marginBottom: 6 }}>I have a mild issue</div>
          <div style={{ fontSize: 14, color: '#6B6B68', lineHeight: 1.5 }}>
            Something bothering me but<br/>not an emergency
          </div>
          <div style={{ marginTop: 16, display: 'flex', alignItems: 'center', gap: 6, color: '#92400E', fontSize: 14, fontWeight: 700 }}>
            Find a clinic →
          </div>
        </div>

        <div style={{ marginTop: 18, textAlign: 'center', fontSize: 13, color: '#AAA' }}>
          Not sure? Choose mild — we'll guide you.
        </div>
      </div>
      <HomeIndicator/>
    </div>
  );
}

// ── Screen 3A: Severe ─────────────────────────────────────────
function ScreenSevere({ navigate, onBack }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#1A0A0A' }}>
      <StatusBar dark/>
      <div style={{ padding: '0 20px 10px', display: 'flex', alignItems: 'center' }}>
        <BackBtn onBack={onBack} dark/>
      </div>
      <div className="scroll-content" style={{ padding: '8px 20px 24px' }}>
        {/* Urgent banner */}
        <div style={{ background: '#FF4D4D', borderRadius: 18, padding: '16px 20px', marginBottom: 24, display: 'flex', alignItems: 'center', gap: 12 }}>
          <span style={{ fontSize: 26 }}>🚨</span>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: 'rgba(255,255,255,0.7)', marginBottom: 2 }}>EMERGENCY MODE</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#fff' }}>Get help immediately</div>
          </div>
        </div>

        <div style={{ fontSize: 32, fontWeight: 900, color: '#fff', lineHeight: 1.2, marginBottom: 20 }}>Get help now</div>

        {/* Nearest ER */}
        <div style={{ background: '#2A1010', borderRadius: 20, padding: 20, marginBottom: 14, border: '1.5px solid #3D1515' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#FF7070', letterSpacing: 0.8, marginBottom: 10 }}>NEAREST EMERGENCY ROOM</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <span style={{ fontSize: 20 }}>📍</span>
            <div style={{ fontSize: 18, fontWeight: 800, color: '#fff' }}>Ospedale Policlinico</div>
          </div>
          <div style={{ fontSize: 14, color: '#FF9999', marginLeft: 30, marginBottom: 14 }}>0.8 km away</div>
          <div style={{ display: 'flex', gap: 10 }}>
            <div style={{ background: '#3D1515', borderRadius: 12, padding: '10px 14px', textAlign: 'center', flex: 1 }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: '#fff' }}>~12</div>
              <div style={{ fontSize: 11, color: '#FF9999' }}>min walking</div>
            </div>
            <div style={{ background: '#3D1515', borderRadius: 12, padding: '10px 14px', textAlign: 'center', flex: 1 }}>
              <div style={{ fontSize: 20, fontWeight: 800, color: '#fff' }}>~5</div>
              <div style={{ fontSize: 11, color: '#FF9999' }}>min by taxi</div>
            </div>

// ── App root ──────────────────────────────────────────────────
const SCREENS = ['home','triage','severe','body','symptoms','loading','results','detail'];

function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('mt_screen') || 'home');
  const [history, setHistory] = useState(['home']);
  const [userName] = useState('Emma');

  const navigate = (to) => {
    setHistory(h => [...h, to]);
    setScreen(to);
    localStorage.setItem('mt_screen', to);
  };

  const goBack = () => {
    if (history.length > 1) {
      const newH = history.slice(0, -1);
      setHistory(newH);
      const prev = newH[newH.length - 1];
      setScreen(prev);
      localStorage.setItem('mt_screen', prev);
    }
  };

  const screenProps = { navigate, onBack: goBack, userName };

  const renderScreen = () => {
    switch(screen) {
      case 'home': return <ScreenHome {...screenProps}/>;
      case 'triage': return <ScreenTriage {...screenProps}/>;
      case 'severe': return <ScreenSevere {...screenProps}/>;
      case 'body': return <ScreenBody {...screenProps}/>;
      case 'symptoms': return <ScreenSymptoms {...screenProps}/>;
      case 'loading': return <ScreenLoading {...screenProps}/>;
      case 'results': return <ScreenResults {...screenProps}/>;
      case 'detail': return <ScreenDetail {...screenProps}/>;
      default: return <ScreenHome {...screenProps}/>;
    }
  };

  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      {renderScreen()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

<script>
// Tweaks panel
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode') {
    document.getElementById('tweaks-panel').style.display = 'block';
  } else if (e.data?.type === '__deactivate_edit_mode') {
    document.getElementById('tweaks-panel').style.display = 'none';
  }
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"startScreen":"home","accentColor":"teal"}/*EDITMODE-END*/;

const screenLabels = [
  ['home','🏠 Home'], ['triage','🩺 Triage'], ['severe','🚨 Severe'],
  ['body','🫁 Body'], ['symptoms','💊 Symptoms'], ['results','🏥 Results'], ['detail','📋 Detail']
];
const container = document.getElementById('screen-tweaks');
screenLabels.forEach(([id, label]) => {
  const btn = document.createElement('div');
  btn.className = 'tweak-opt' + (id === TWEAK_DEFAULTS.startScreen ? ' active' : '');
  btn.textContent = label;
  btn.style.fontSize = '11px';
  btn.onclick = () => {
    document.querySelectorAll('.tweak-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    localStorage.setItem('mt_screen', id);
    location.reload();
  };

});
</script>
