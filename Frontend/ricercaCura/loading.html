<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediTrip — Loading</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="loading.css">
</head>
<body>
  <div class="phone-shell" id="phone">
    <div class="island"></div>
    <div id="status-bar-container"></div>
    
    <div class="scroll-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 40px; height: 100%;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 24px;">
        <div class="spinner"></div>
        <div style="text-align: center;">
          <div style="font-size: 22px; font-weight: 800; color: #1C1C1A; margin-bottom: 8px;">Checking your coverage...</div>
          <div style="font-size: 15px; color: #888; line-height: 1.5;">We're finding the best option<br/>for your insurance</div>
        </div>

        <div style="margin-top: 16px;">
          <span class="badge badge-green" style="font-size: 14px; padding: 8px 16px;">
            ✓ EHIC + University insurance
          </span>
        </div>
      </div>
    </div>

    <div id="home-indicator-container"></div>
  </div>

  <script src="common.js"></script>
  <script src="loading.js"></script>
</body>
</html>
